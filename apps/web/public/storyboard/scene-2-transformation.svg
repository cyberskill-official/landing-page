<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Scene 2 - From sketch to system.</title>
  <desc id="desc">Loose wireframe marks resolve into a stable product system.</desc>
  <rect width="1200" height="800" fill="#090a0f"/>
  <path d="M140 520c84-130 170-150 258-60s170 72 250-52" fill="none" stroke="#d8cab3" stroke-width="12" stroke-linecap="round" stroke-dasharray="26 24"/>
  <rect x="680" y="270" width="390" height="270" rx="18" fill="#141017" stroke="#e8b523" stroke-width="10"/>
  <rect x="720" y="322" width="132" height="72" rx="8" fill="#4a2f1b"/>
  <rect x="878" y="322" width="142" height="72" rx="8" fill="#9c6b1f"/>
  <rect x="720" y="424" width="300" height="64" rx="8" fill="#d8cab3"/>
  <circle cx="600" cy="404" r="44" fill="#e8b523"/>
  <path d="M600 360v88M556 404h88" stroke="#090a0f" stroke-width="12" stroke-linecap="round"/>
  <text x="80" y="140" fill="#f7efe1" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="700">From sketch to system.</text>
  <text x="80" y="214" fill="#d8cab3" font-family="Arial, Helvetica, sans-serif" font-size="30">Most software dies in the gap between sketch and ship. We close it.</text>
  <text x="80" y="700" fill="#e8b523" font-family="Arial, Helvetica, sans-serif" font-size="28">Scene 2 Transformation</text>
</svg>
