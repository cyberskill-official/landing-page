<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Scene 6 - What do you want to make real?</title>
  <desc id="desc">Three decision paths invite buyers, partners, and future teammates to act.</desc>
  <rect width="1200" height="800" fill="#090a0f"/>
  <rect x="140" y="324" width="260" height="220" rx="18" fill="#4a2f1b" stroke="#e8b523" stroke-width="8"/>
  <rect x="470" y="284" width="260" height="260" rx="18" fill="#9c6b1f" stroke="#e8b523" stroke-width="8"/>
  <rect x="800" y="324" width="260" height="220" rx="18" fill="#4a2f1b" stroke="#e8b523" stroke-width="8"/>
  <text x="232" y="438" fill="#f7efe1" font-family="Arial, Helvetica, sans-serif" font-size="34">Buy</text>
  <text x="540" y="422" fill="#f7efe1" font-family="Arial, Helvetica, sans-serif" font-size="34">Partner</text>
  <text x="892" y="438" fill="#f7efe1" font-family="Arial, Helvetica, sans-serif" font-size="34">Join</text>
  <path d="M600 250v-82M600 250l-56-56M600 250l56-56" fill="none" stroke="#e8b523" stroke-width="12" stroke-linecap="round"/>
  <text x="80" y="132" fill="#f7efe1" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">What do you want to make real?</text>
  <text x="80" y="204" fill="#d8cab3" font-family="Arial, Helvetica, sans-serif" font-size="32">You bring the will. We bring the real.</text>
  <text x="80" y="700" fill="#e8b523" font-family="Arial, Helvetica, sans-serif" font-size="28">Scene 6 CTA Hub</text>
