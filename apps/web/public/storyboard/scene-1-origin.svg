  <title id="title">Scene 1 - Saigon, 2020.</title>
  <desc id="desc">A quiet Saigon workbench frames the founder's rule about signed craft.</desc>
  <rect width="1200" height="800" fill="#090a0f"/>
  <rect x="90" y="500" width="1020" height="78" rx="8" fill="#4a2f1b"/>
  <rect x="220" y="280" width="360" height="220" rx="8" fill="#d8cab3"/>
  <path d="M270 350h250M270 405h190M270 460h120" stroke="#4a2f1b" stroke-width="12" stroke-linecap="round"/>
  <path d="M650 492c60-110 176-180 300-170" fill="none" stroke="#e8b523" stroke-width="12" stroke-linecap="round"/>
  <circle cx="980" cy="318" r="56" fill="#e8b523"/>
  <path d="M825 468l72-42 72 42-72 42z" fill="#9c6b1f"/>
  <text x="80" y="140" fill="#f7efe1" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700">Saigon, 2020.</text>
  <text x="80" y="214" fill="#d8cab3" font-family="Arial, Helvetica, sans-serif" font-size="32">Stephen had one rule: build what you'd be proud to sign.</text>
