name: LFS bandwidth monitor

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Check LFS quota
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_REPO_OPS: ${{ secrets.SLACK_WEBHOOK_REPO_OPS }}
        run: |
          set -euo pipefail
          payload="$(gh api "repos/${{ github.repository }}/lfs" 2>/dev/null || true)"
          if [ -z "$payload" ]; then
            echo "GitHub LFS quota endpoint unavailable for this repository; skipping quota alert."
            exit 0
          fi

          usage="$(printf '%s' "$payload" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>console.log(JSON.parse(s).usage_bytes ?? 0))")"
          quota="$(printf '%s' "$payload" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>console.log(JSON.parse(s).quota_bytes ?? 1073741824))")"
          pct=$((usage * 100 / quota))
          echo "LFS usage: $usage / $quota bytes ($pct%)"

          if [ "$pct" -gt 80 ]; then
            message="LFS usage is ${pct}%. Run git lfs prune --verify-remote or upgrade the plan."
            if [ -n "${SLACK_WEBHOOK_REPO_OPS:-}" ]; then
              curl -fsS -X POST -H "Content-Type: application/json" \
                -d "{\"text\":\"$message\"}" \
                "$SLACK_WEBHOOK_REPO_OPS"
            else
              echo "::warning::$message"
            fi
          fi
