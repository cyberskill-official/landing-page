name: PR asset comment

on:
  pull_request:
    paths:
      - 'assets-built/**'
      - 'assets-source/**'
      - 'apps/web/public/**/*.glb'
      - 'apps/web/public/**/*.ktx2'

permissions:
  contents: read
  pull-requests: write

jobs:
  asset-delta:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build PR asset reports
        run: |
          set -euo pipefail
          mkdir -p assets-built/optimized
          for raw in assets-built/raw/*.glb; do
            [ -e "$raw" ] || continue
            out="assets-built/optimized/$(basename "$raw" .raw.glb).glb"
            pnpm gltf-pipeline "$raw" "$out"
          done
      - name: Fetch main asset report baseline
        run: |
          set -euo pipefail
          mkdir -p /tmp/main-reports
          git fetch origin main
          git ls-tree -r --name-only origin/main -- assets-built/optimized \
            | grep '\.report\.json$' \
            | while read -r report; do
                target="/tmp/main-reports/$(basename "$report")"
                git show "origin/main:$report" > "$target"
              done || true
      - name: Render asset delta comment
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node scripts/pr-comment-asset-delta.mjs \
            --main-dir /tmp/main-reports \
            --pr-dir assets-built/optimized \
            --pr-number "$PR_NUMBER" \
            --out asset-delta-comment.md \
            --json-out asset-delta-summary.json
      - name: Upsert PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const body = fs.readFileSync('asset-delta-comment.md', 'utf8');
            const summary = JSON.parse(fs.readFileSync('asset-delta-summary.json', 'utf8'));
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) => comment.body?.includes('<!-- pr-asset-delta -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            if (summary.failCount > 0) {
              core.setFailed(`${summary.failCount} asset(s) over fail threshold`);
            }
