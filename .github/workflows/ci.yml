name: CI

on:
  push:
    branches: [main, "auto/**", "codex/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Static import check
        run: npm run verify
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Performance budget is well-formed (Phase-3 gate)
        run: |
          node -e "const b=require('./lighthouse/budget.json'); if(!Array.isArray(b)||!b[0]?.timings?.length){throw new Error('budget.json malformed')} const lcp=b[0].timings.find(t=>t.metric==='largest-contentful-paint'); if(!lcp||lcp.budget>2500){throw new Error('LCP budget must stay <=2500ms')}; console.log('perf budget ok: LCP<='+lcp.budget+'ms')"

  # FR-PERF-002: run Lighthouse against the built site and assert the budget in
  # lighthouse/budget.json. Advisory for now (continue-on-error) because CI-measured
  # timing metrics can flake on a shared runner; once the first runs baseline green,
  # drop continue-on-error to make it a required gate. Results upload to temporary
  # public storage and the URL is printed in the job log.
  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Lighthouse CI (budget assertions)
        run: npx -y @lhci/cli@0.14.x autorun
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
