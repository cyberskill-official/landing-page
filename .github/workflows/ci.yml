name: CI

on:
  push:
    branches: [main, "auto/**", "codex/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        # `npm install` runs `prisma generate` via postinstall (lib/db/prisma.ts
        # needs the generated PrismaClient to typecheck). `generate` only reads
        # the schema and never opens a connection, but prisma.config.ts eagerly
        # resolves DATABASE_URL just to load, so this step needs a syntactically
        # valid placeholder - not a real credential. Scoped to this step only:
        # lib/db/index.ts's getDb() switches to the real PrismaDbAdapter whenever
        # DATABASE_URL is set, so leaking it into Unit tests / Build would make
        # those hit a real (nonexistent) Postgres instead of the InMemoryAdapter
        # tests are written against.
        run: npm install --no-audit --no-fund
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      - name: FR spec gate (ADR-001)
        run: npm run check:frs
      - name: Static import check
        run: npm run verify
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Asset + bundle size guard (FR-PERF-003)
        run: npm run check:assets
      - name: Performance budget is well-formed (Phase-3 gate)
        run: |
          node -e "const b=require('./lighthouse/budget.json'); if(!Array.isArray(b)||!b[0]?.timings?.length){throw new Error('budget.json malformed')} const lcp=b[0].timings.find(t=>t.metric==='largest-contentful-paint'); if(!lcp||lcp.budget>2500){throw new Error('LCP budget must stay <=2500ms')}; console.log('perf budget ok: LCP<='+lcp.budget+'ms')"

  # FR-PERF-002: run Lighthouse (mobile emulation, median of 3) against the built
  # site and assert in lighthouserc.json. Required gate, but scoped to what is
  # stable on a shared runner: CLS and the resource-size/third-party budgets are
  # hard errors (deterministic build outputs + a now-stable CLS), while LCP, TTI,
  # and TBT are warnings - those timing metrics are inflated by measuring a cold
  # `next start` on contended CI hardware (production LCP is ~1.5s vs ~2.6s here),
  # so they are validated against the deployed URL and Vercel Speed Insights, not
  # blocked on. Results upload to temporary public storage (URL in the job log).
  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        # See the `build` job's Install step for why this is here and scoped
        # to just this step: `prisma generate` (postinstall) needs a
        # syntactically valid DATABASE_URL to load prisma.config.ts, but the
        # app must run without it so lib/db/index.ts's getDb() falls back to
        # the InMemoryAdapter for Build.
        run: npm install --no-audit --no-fund
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      - name: Build
        run: npm run build
      - name: Lighthouse CI (budget assertions)
        run: npx -y @lhci/cli@0.14.x autorun
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

  # FR-A11Y-003 (served-route gate): run axe-core against the real rendered
  # routes (home en+vi, /work, /careers, a case study) on a served production
  # build, so page-level rules and real color-contrast - which the jsdom
  # component check in the build job cannot see - are exercised, failing on
  # serious/critical. Required gate: it was introduced advisory and observed
  # green on run 28089290130 (all five routes clean with real Chrome), so it now
  # blocks the build, the same staged path the Lighthouse gate took.
  a11y:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        # See the `build` job's Install step for why this is here and scoped
        # to just this step: `prisma generate` (postinstall) needs a
        # syntactically valid DATABASE_URL to load prisma.config.ts, but the
        # app must run without it so lib/db/index.ts's getDb() falls back to
        # the InMemoryAdapter for Build.
        run: npm install --no-audit --no-fund
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      - name: Build
        run: npm run build
      - name: Served-route axe gate (serious/critical)
        run: npm run check:a11y:routes
