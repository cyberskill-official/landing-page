name: perf-budgets
on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: perf-budgets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  budgets:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }
      - uses: pnpm/action-setup@v4
        with: { version: 11.1.2 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F web build
      - name: Run gltf-pipeline on raw GLBs
        run: |
          set -euo pipefail
          mkdir -p assets-built/optimized
          for raw in assets-built/raw/*.glb; do
            [ -e "$raw" ] || continue
            out="assets-built/optimized/$(basename "$raw" .raw.glb).glb"
            pnpm gltf-pipeline "$raw" "$out"
          done
      - name: Check JS bundle budget
        run: node tools/perf-budgets/check-js-bundle.mjs --output=js-bundle-summary.json
      - name: Check asset budgets
        run: node tools/perf-budgets/check-asset-sizes.mjs --report=asset-summary.json
      - name: Run Lighthouse CI
        run: pnpm dlx @lhci/cli@0.15.1 autorun --config apps/web/lighthouserc.json
      - name: Check CWV budgets
        run: node tools/perf-budgets/check-cwv.mjs --output=cwv-summary.json .lighthouseci/lhr-*.json
      - name: Comment on perf budget breach
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- perf-budgets -->';
            const body = `${marker}
            perf-budgets breach. See the failed job logs and generated summaries.

            To weaken a threshold, open an FR named \`FR-PERF-NNN-budget-amendment-rationale\` and follow AGENTS.md §16.2.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const previous = comments.find((comment) => comment.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-budget-summaries
          path: |
            js-bundle-summary.json
            asset-summary.json
            cwv-summary.json
            .lighthouseci/
          retention-days: 30
