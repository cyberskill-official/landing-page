name: a11y CI

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  a11y:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm -F web exec playwright install chromium --with-deps

      - name: Build web app
        run: pnpm -F web build

      - name: Start production server
        shell: bash
        run: |
          pnpm -F web start -- --hostname 127.0.0.1 --port 3000 > /tmp/next-a11y.log 2>&1 &
          echo "$!" > /tmp/next-a11y.pid

      - name: Wait for health check
        run: curl --retry 30 --retry-delay 2 --retry-connrefused --fail http://127.0.0.1:3000/api/health

      - name: Check a11y skip label
        id: skip
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          labels='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$labels" | grep -q '"a11y:skip"'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "a11y gate skipped by a11y:skip label."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run axe route gate
        if: steps.skip.outputs.skip != 'true'
        env:
          A11Y_REPORT_PATH: a11y-report.json
        run: pnpm -F web exec playwright test tests/a11y/all-routes.spec.ts --reporter=line

      - name: Generate a11y PR summary
        id: a11y-summary
        if: always() && steps.skip.outputs.skip != 'true'
        run: |
          node apps/web/scripts/a11y-summary.mjs \
            --report=apps/web/a11y-report.json \
            --output=/tmp/a11y-summary.md
          echo "path=/tmp/a11y-summary.md" >> "$GITHUB_OUTPUT"

      - name: Post a11y PR comment
        if: always() && steps.skip.outputs.skip != 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const body = fs.readFileSync('${{ steps.a11y-summary.outputs.path }}', 'utf8');
            const marker = '<!-- a11y-report -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const previous = comments.data.find((comment) => comment.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Upload a11y artifacts
        if: always() && steps.skip.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: a11y-reports
          path: |
            apps/web/a11y-report.json
            apps/web/test-results/
            /tmp/a11y-summary.md
          retention-days: 30
