name: Asset size + decoder gate

on:
  pull_request:
    paths:
      - 'assets-built/**'
      - 'assets-source/**'
      - 'apps/web/public/**/*.glb'
      - 'apps/web/public/**/*.ktx2'
      - 'apps/web/public/decoders/**'
      - 'apps/web/components/**'
      - 'apps/web/app/**'
      - 'apps/web/lib/**'
      - 'scripts/gltf-pipeline.mjs'
      - 'scripts/gltf-pipeline.config.json'
      - 'tools/perf-budgets/**'
  push:
    branches: [main]
    paths:
      - 'assets-built/**'
      - 'assets-source/**'
      - 'apps/web/public/**/*.glb'
      - 'apps/web/public/**/*.ktx2'
      - 'apps/web/public/decoders/**'
      - 'apps/web/components/**'
      - 'apps/web/app/**'
      - 'apps/web/lib/**'
      - 'scripts/gltf-pipeline.mjs'
      - 'scripts/gltf-pipeline.config.json'
      - 'tools/perf-budgets/**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: asset-size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asset-size:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Restore main asset report baseline
        id: asset-baseline
        uses: actions/cache/restore@v4
        with:
          path: /tmp/main-reports
          key: asset-reports-main-${{ github.event.pull_request.base.sha || github.sha }}
          restore-keys: |
            asset-reports-main-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check assets-budget skip label
        id: skip
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          labels='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$labels" | grep -q '"assets-budget:skip"'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Asset budget gate skipped by assets-budget:skip label."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild optimized GLBs
        if: steps.skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p assets-built/optimized
          for raw in assets-built/raw/*.glb; do
            [ -e "$raw" ] || continue
            out="assets-built/optimized/$(basename "$raw" .raw.glb).glb"
            pnpm gltf-pipeline "$raw" "$out"
          done

      - name: Fetch main reports fallback
        if: steps.skip.outputs.skip != 'true' && steps.asset-baseline.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/main-reports
          git fetch origin main
          git ls-tree -r --name-only origin/main -- assets-built/optimized \
            | grep '\.report\.json$' \
            | while read -r report; do
                target="/tmp/main-reports/$(basename "$report")"
                git show "origin/main:$report" > "$target"
              done || true

      - name: No forbidden runtime CDN references
        if: steps.skip.outputs.skip != 'true'
        run: node tools/perf-budgets/check-no-cdn.mjs --json-out=asset-cdn-summary.json

      - name: Canvas source aria-hidden check
        if: steps.skip.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if rg '<canvas' apps/web/components apps/web/app -g '*.{ts,tsx,js,jsx}' | rg -v 'aria-hidden='; then
            echo "Found <canvas> source without aria-hidden=\"true\"."
            exit 1
          fi

      - name: Asset size and decoder bundle check
        if: steps.skip.outputs.skip != 'true'
        env:
          ALLOW_LARGE_ASSETS: '0'
        run: node tools/perf-budgets/check-asset-sizes.mjs --cdn-summary=asset-cdn-summary.json --report=asset-summary.json

      - name: Render asset delta comment
        if: always() && steps.skip.outputs.skip != 'true' && github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node scripts/pr-comment-asset-delta.mjs \
            --main-dir /tmp/main-reports \
            --pr-dir assets-built/optimized \
            --pr-number "$PR_NUMBER" \
            --out asset-delta-comment.md \
            --json-out asset-delta-summary.json

      - name: Upsert asset delta PR comment
        if: always() && steps.skip.outputs.skip != 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const body = fs.readFileSync('asset-delta-comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const previous = comments.data.find((comment) => comment.body?.includes('<!-- pr-asset-delta -->'));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Upload asset summaries
        if: always() && steps.skip.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: asset-size-summary
          path: |
            asset-summary.json
            asset-cdn-summary.json
            asset-delta-summary.json
            asset-delta-comment.md
            assets-built/optimized/*.report.json
          retention-days: 30

      - name: Prepare main asset report baseline
        if: steps.skip.outputs.skip != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/main-reports
          cp assets-built/optimized/*.report.json /tmp/main-reports/ 2>/dev/null || true

      - name: Save main asset report baseline
        if: steps.skip.outputs.skip != 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: /tmp/main-reports
          key: asset-reports-main-${{ github.sha }}
